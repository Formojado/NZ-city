<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NZ SCANNER: GREEN FRONTIER</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --nz-green: #2D5A27; --nz-fern: #4F7942; --nz-gold: #E6B325; --nz-slate: #2F4F4F; }
    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: #fdfdfd; overflow: hidden; }
    #map { height: 100vh; width: 100vw; z-index: 1; }

    /* UI 頂部 */
    .header-ui { position: absolute; top: 0; left: 0; width: 100%; height: 320px; z-index: 1001; pointer-events: none; display: flex; justify-content: center; }
    .viewport { position: relative; width: 100%; height: 320px; overflow: hidden; display: flex; justify-content: center; }
    .belt { display: flex; position: absolute; left: 50%; top: 40px; transform: translateX(-50%); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
    
    /* 卡片設計：綠色系與 Koru 背景 */
    .city-card { 
        width: 280px; padding: 30px; margin: 0 20px; background: #fff; 
        border: 6px solid var(--nz-slate); border-radius: 24px; opacity: 0.1; transform: scale(0.85); transition: 0.5s;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        flex-shrink: 0; box-shadow: 12px 12px 0px var(--nz-slate); position: relative; overflow: hidden;
    }
    .city-card.active { opacity: 1; transform: scale(1.1); box-shadow: 15px 15px 0px var(--nz-green); }

    /* Koru SVG 圖騰 */
    .koru-svg { width: 160px; height: 160px; position: absolute; opacity: 0.08; z-index: 0; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .city-name-en { font-size: 2.2rem; font-weight: 900; color: #000; z-index: 2; margin: 0; text-align: center; }
    .city-region { font-size: 1.1rem; color: var(--nz-fern); font-weight: bold; z-index: 2; text-transform: uppercase; letter-spacing: 1px; }

    /* 數據版面 */
    .stats-panel { 
        position: absolute; bottom: 30px; left: 30px; z-index: 1002; background: #fff; 
        padding: 15px 35px; border: 5px solid var(--nz-slate); border-radius: 15px; box-shadow: 10px 10px 0px var(--nz-slate);
        font-weight: 900; font-size: 1.2rem;
    }

    /* 控制按鈕 */
    .control-layer { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 1005; }
    .btn { 
        padding: 20px 60px; font-size: 1.6rem; font-weight: 900; cursor: pointer; 
        border-radius: 25px; border: 5px solid var(--nz-slate); color: #fff; display: none; 
        box-shadow: 8px 8px 0px var(--nz-slate); text-transform: uppercase;
    }
    #confirmBtn { background: var(--nz-green); }
    #nextBtn { background: var(--nz-slate); }

    /* 綠色自然系開頭 */
    .modal-overlay { 
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; 
        background: linear-gradient(135deg, #e8f5e9 0%, #fff 50%, #c8e6c9 100%); 
    }
    .start-box { 
        text-align: center; border: 12px solid var(--nz-slate); padding: 60px; background: #fff; 
        width: 500px; border-radius: 50px; box-shadow: 40px 40px 0px rgba(47, 79, 79, 0.2);
        display: flex; flex-direction: column; align-items: center;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="header-ui"><div class="viewport"><div class="belt" id="belt"></div></div></div>
  
  <div class="stats-panel" id="statsPanel" style="display:none">
    <div id="score">SCORE: 0</div>
    <div style="color: var(--nz-green);"><span id="progress">0</span> / <span id="total">0</span></div>
  </div>

  <div class="control-layer">
    <button class="btn" id="confirmBtn">CONFIRM TARGET</button>
    <button class="btn" id="nextBtn">NEXT MISSION</button>
  </div>

  <div id="startModal" class="modal-overlay">
    <div class="start-box">
      <h1 style="font-size: 3rem; font-weight: 900; color: var(--nz-slate); margin:0;">NZ SCANNER</h1>
      <p style="color:var(--nz-green); font-weight:bold; margin-top:5px;">GREEN FRONTIER EDITION</p>
      <div id="countDisplay" style="font-size: 9rem; font-weight: 900; margin: 10px 0; color: var(--nz-slate); line-height: 1;">100</div>
      <input type="range" id="citySlider" min="5" max="100" value="100" style="width:100%; accent-color: var(--nz-green); margin-bottom: 20px;">
      <button id="startBtn" style="width:100%; padding:25px; background:var(--nz-green); color:#fff; font-weight:900; border:5px solid var(--nz-slate); border-radius:20px; cursor:pointer; font-size:1.8rem;">START EXPLORING</button>
    </div>
  </div>

  <script>
    // 紐西蘭資料庫 (包含大城市 Priority 1 與觀光名點 Priority 2, 3)
    const DB = [
        {en:"Auckland", region:"Auckland", p:1, coords:[-36.8485, 174.7633]},
        {en:"Wellington", region:"Wellington", p:1, coords:[-41.2865, 174.7762]},
        {en:"Christchurch", region:"Canterbury", p:1, coords:[-43.5321, 172.6362]},
        {en:"Hamilton", region:"Waikato", p:1, coords:[-37.7870, 175.2793]},
        {en:"Dunedin", region:"Otago", p:1, coords:[-45.8788, 170.5028]},
        {en:"Queenstown", region:"Otago", p:2, coords:[-45.0312, 168.6626]},
        {en:"Rotorua", region:"Bay of Plenty", p:2, coords:[-38.1368, 176.2497]},
        {en:"Napier", region:"Hawke's Bay", p:2, coords:[-39.4928, 176.9120]},
        {en:"Nelson", region:"Nelson", p:2, coords:[-41.2706, 173.2840]},
        {en:"Taupo", region:"Waikato", p:2, coords:[-38.6857, 176.0702]},
        {en:"Matamata", region:"Waikato", p:3, coords:[-37.8130, 175.7725]}, // Hobbiton
        {en:"Te Anau", region:"Southland", p:3, coords:[-45.4167, 167.7167]}, // Milford Sound Gate
        {en:"Wanaka", region:"Otago", p:3, coords:[-44.7032, 169.1321]},
        {en:"Franz Josef", region:"West Coast", p:3, coords:[-43.3878, 170.1818]},
        {en:"Akaroa", region:"Canterbury", p:3, coords:[-43.8033, 172.9683]},
        {en:"Russell", region:"Northland", p:3, coords:[-35.2625, 174.1214]},
        {en:"Picton", region:"Marlborough", p:2, coords:[-41.2897, 174.0061]},
        {en:"Invercargill", region:"Southland", p:1, coords:[-46.4131, 168.3538]}
        // ... 此處可擴充至 120 個
    ];

    let cities=[], idx=0, score=0, currentClick=null, isAnswered=false;
    let pMarker=null, tMarker=null, line=null;

    const KORU_SVG = `<svg class="koru-svg" viewBox="0 0 100 100"><path d="M50 95C25.1472 95 5 74.8528 5 50C5 25.1472 25.1472 5 50 5C74.8528 5 95 25.1472 95 50C95 58 92 65 85 70C78 75 70 75 65 70C60 65 60 55 65 50C70 45 75 45 80 50C85 55 85 65 75 70" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/></svg>`;

    const map = L.map('map',{zoomControl:false, attributionControl:false}).setView([-40.9, 174.8], 6);
    // 使用地形底圖 (Terrain)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

    document.getElementById('citySlider').oninput = function() { document.getElementById('countDisplay').innerText = this.value; };

    function startMission() {
        const num = parseInt(document.getElementById('citySlider').value);
        // 難度邏輯：數量少時優先挑選 Priority 1 大城市
        let pool = [...DB].sort((a,b) => a.p - b.p);
        cities = pool.slice(0, Math.max(num, 10)).sort(() => Math.random() - 0.5).slice(0, num);
        
        document.getElementById('startModal').style.display = 'none';
        document.getElementById('statsPanel').style.display = 'flex';
        document.getElementById('total').innerText = cities.length;

        const belt = document.getElementById('belt');
        belt.innerHTML = cities.map(c => `
            <div class="city-card">
                <div class="koru-svg" style="color:var(--nz-green)">${KORU_SVG}</div>
                <div class="city-name-en">${c.en}</div>
                <div class="city-region">${c.region}</div>
            </div>`).join('');
        refreshRound();
    }

    function refreshRound() {
        isAnswered = false; currentClick = null;
        if(pMarker) map.removeLayer(pMarker); if(tMarker) map.removeLayer(tMarker); if(line) map.removeLayer(line);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('progress').innerText = idx + 1;
        
        const cards = document.querySelectorAll('.city-card');
        cards.forEach(c => c.classList.remove('active'));
        const activeCard = cards[idx];
        activeCard.classList.add('active');
        
        const belt = document.getElementById('belt');
        const offset = activeCard.offsetLeft + (activeCard.offsetWidth / 2);
        belt.style.transform = `translateX(${-offset}px)`;
        map.flyTo([-40.9, 174.8], 6);
    }

    map.on('click', e => {
        if(isAnswered) return;
        currentClick = e.latlng;
        if(pMarker) map.removeLayer(pMarker);
        // 玩家點擊：深藍綠色圓圈
        pMarker = L.circleMarker(e.latlng, {radius:12, color:'#2F4F4F', fillColor: '#fff', weight:5, fillOpacity:1}).addTo(map);
        document.getElementById('confirmBtn').style.display = 'block';
    });

    function handleConfirm() {
        isAnswered = true;
        document.getElementById('confirmBtn').style.display = 'none';
        const target = cities[idx];
        const dist = map.distance(currentClick, target.coords) / 1000;
        const pts = Math.round(5000 * Math.pow(Math.E, -dist / 150)); // 紐西蘭跨度大，分母調為 150 較公平
        
        // 答案標示：金黃色圓圈，大小一致
        tMarker = L.circleMarker(target.coords, {radius:12, color:'#2F4F4F', fillColor: '#E6B325', weight:5, fillOpacity:1}).addTo(map);
        line = L.polyline([currentClick, target.coords], {color: '#2D5A27', weight:4, dashArray:'10,10'}).addTo(map);
        
        score += pts;
        document.getElementById('score').innerText = `SCORE: ${score}`;
        map.flyTo(target.coords, 9);
        setTimeout(() => document.getElementById('nextBtn').style.display = 'block', 600);
    }

    document.getElementById('startBtn').onclick = startMission;
    document.getElementById('confirmBtn').onclick = handleConfirm;
    document.getElementById('nextBtn').onclick = () => { idx++; if(idx < cities.length) refreshRound(); else location.reload(); };
    window.addEventListener('keydown', e => { if(e.code === 'Space') { e.preventDefault(); if(isAnswered) document.getElementById('nextBtn').click(); else if(currentClick) handleConfirm(); } });
  </script>
</body>
</html>
